<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="草书范字图标">
  <defs>
    <radialGradient id="paper" cx="32%" cy="24%" r="86%">
      <stop offset="0" stop-color="#fffdf7"/>
      <stop offset="0.62" stop-color="#f4eedf"/>
      <stop offset="1" stop-color="#e3d8c1"/>
    </radialGradient>
    <linearGradient id="paperEdge" x1="72" y1="56" x2="432" y2="456" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff9ee"/>
      <stop offset="1" stop-color="#d8ccb2"/>
    </linearGradient>
    <linearGradient id="ink" x1="160" y1="118" x2="344" y2="396" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#365f68"/>
      <stop offset="0.55" stop-color="#244852"/>
      <stop offset="1" stop-color="#18343b"/>
    </linearGradient>
    <filter id="paperShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#80725d" flood-opacity="0.25"/>
    </filter>
    <filter id="inkSoft" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="4" flood-color="#18343b" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect x="40" y="40" width="432" height="432" rx="112" fill="url(#paper)" filter="url(#paperShadow)"/>
  <rect x="56" y="56" width="400" height="400" rx="94" fill="none" stroke="url(#paperEdge)" stroke-width="10"/>
  <rect x="72" y="72" width="368" height="368" rx="80" fill="none" stroke="#d7ccb8" stroke-width="3" opacity="0.7"/>

  <path d="M120 132c82-28 181-35 268-12" fill="none" stroke="#fffaf0" stroke-width="12" stroke-linecap="round" opacity="0.65"/>

  <text x="258" y="344"
        text-anchor="middle"
        font-family="Xingkai SC, STXingkai, STKaiti, KaiTi, serif"
        font-size="286"
        font-weight="300"
        letter-spacing="-6"
        fill="#fdf9f0"
        opacity="0.78"
        transform="rotate(-6 258 344) translate(7 10)">范</text>
  <text x="256" y="338"
        text-anchor="middle"
        font-family="Xingkai SC, STXingkai, STKaiti, KaiTi, serif"
        font-size="286"
        font-weight="300"
        letter-spacing="-6"
        fill="url(#ink)"
        filter="url(#inkSoft)"
        transform="rotate(-6 256 338)">范</text>
</svg>
