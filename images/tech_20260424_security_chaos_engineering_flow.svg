<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Security drill loop</title>
  <desc id="desc">A flow diagram showing the loop of security drill practice: scenario, inject, detect, triage, contain, recover, and review.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#325c7a"/>
    </marker>
    <style>
      .bg { fill: #f6f3ea; }
      .title { font: 700 28px Georgia, 'Times New Roman', serif; fill: #22313f; }
      .subtitle { font: 400 15px Georgia, 'Times New Roman', serif; fill: #52606d; }
      .boxtext { font: 700 18px Georgia, 'Times New Roman', serif; fill: #1f2933; }
      .subtext { font: 400 13px Georgia, 'Times New Roman', serif; fill: #52606d; }
      .line { stroke: #325c7a; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .box1 { fill: #d9efe8; stroke: #4f8a7a; stroke-width: 2; }
      .box2 { fill: #d8e8f4; stroke: #4d7298; stroke-width: 2; }
      .box3 { fill: #efe2cc; stroke: #a7773f; stroke-width: 2; }
      .box4 { fill: #f3d7d2; stroke: #a65752; stroke-width: 2; }
      .box5 { fill: #e4ddf7; stroke: #6f5aa5; stroke-width: 2; }
      .box6 { fill: #f6edc9; stroke: #a48a28; stroke-width: 2; }
      .note { font: 400 14px Georgia, 'Times New Roman', serif; fill: #394956; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="420" rx="24"/>
  <text class="title" x="60" y="58">Security Drill Loop</text>
  <text class="subtitle" x="60" y="86">Practice the response before the incident becomes real.</text>

  <rect class="box1" x="60" y="150" rx="18" ry="18" width="150" height="86"/>
  <text class="boxtext" x="135" y="184" text-anchor="middle">Scenario</text>
  <text class="subtext" x="135" y="208" text-anchor="middle">Pick one risk</text>

  <rect class="box2" x="245" y="150" rx="18" ry="18" width="150" height="86"/>
  <text class="boxtext" x="320" y="184" text-anchor="middle">Inject</text>
  <text class="subtext" x="320" y="208" text-anchor="middle">Trigger the event</text>

  <rect class="box3" x="430" y="150" rx="18" ry="18" width="150" height="86"/>
  <text class="boxtext" x="505" y="184" text-anchor="middle">Detect</text>
  <text class="subtext" x="505" y="208" text-anchor="middle">See the signal</text>

  <rect class="box4" x="615" y="150" rx="18" ry="18" width="150" height="86"/>
  <text class="boxtext" x="690" y="184" text-anchor="middle">Triage</text>
  <text class="subtext" x="690" y="208" text-anchor="middle">Decide and align</text>

  <rect class="box5" x="800" y="150" rx="18" ry="18" width="150" height="86"/>
  <text class="boxtext" x="875" y="184" text-anchor="middle">Contain</text>
  <text class="subtext" x="875" y="208" text-anchor="middle">Stop the bleed</text>

  <rect class="box6" x="985" y="150" rx="18" ry="18" width="150" height="86"/>
  <text class="boxtext" x="1060" y="184" text-anchor="middle">Recover</text>
  <text class="subtext" x="1060" y="208" text-anchor="middle">Restore safely</text>

  <path class="line" d="M210 193 H245"/>
  <path class="line" d="M395 193 H430"/>
  <path class="line" d="M580 193 H615"/>
  <path class="line" d="M765 193 H800"/>
  <path class="line" d="M950 193 H985"/>

  <path class="line" d="M1060 236 V300 H150 V236"/>
  <rect class="box2" x="495" y="286" rx="18" ry="18" width="210" height="72"/>
  <text class="boxtext" x="600" y="316" text-anchor="middle">Review and Improve</text>
  <text class="subtext" x="600" y="338" text-anchor="middle">Fix runbooks, tools, roles</text>

  <text class="note" x="60" y="392">Measure the loop with TTD, TTA, TTC, and TTR.</text>
</svg>
